media:
  input: media
  output: /media

content:
  - name: business
    label: Business Info
    type: file
    path: content/business.json
    fields:
      - { name: name, label: "Business Name", type: string }
      - { name: tagline, label: "Footer Tagline", type: string }
      - { name: description, label: "SEO Description", type: text }
      - { name: phone, label: "Phone Number", type: string }
      - { name: phone_raw, label: "Phone Digits Only (for links)", type: string }
      - { name: fax, label: "Fax Number", type: string }
      - { name: email, label: "Email Address", type: string }
      - { name: address, label: "Street Address", type: string }
      - { name: city, label: "City", type: string }
      - { name: state, label: "State", type: string }
      - { name: zip, label: "ZIP Code", type: string }
      - { name: service_area, label: "Service Area", type: string }
      - { name: experience_years, label: "Years of Experience (e.g. 50+)", type: string }
      - { name: facebook_url, label: "Facebook URL", type: string }
      - { name: instagram_url, label: "Instagram URL", type: string }
      - { name: linkedin_url, label: "LinkedIn URL", type: string }

  - name: services
    label: Services
    type: file
    path: content/services.json
    fields:
      - name: items
        label: Service Cards
        type: object
        list:
          collapsible:
            summary: "{title}"
        fields:
          - { name: title, label: "Service Name", type: string }
          - { name: description, label: "Description", type: text }
          - name: icon
            label: "Icon"
            type: select
            options:
              - { label: "Store / Retail", value: "fas fa-store" }
              - { label: "Medical / X-Ray", value: "fas fa-x-ray" }
              - { label: "Office Building", value: "fas fa-building" }
              - { label: "Warehouse", value: "fas fa-warehouse" }
              - { label: "Gymnasium", value: "fas fa-dumbbell" }
              - { label: "Showroom / Tags", value: "fas fa-tags" }
              - { label: "Tools / Wrench", value: "fas fa-screwdriver-wrench" }
              - { label: "Clipboard / Contract", value: "fas fa-clipboard-check" }
              - { label: "Rain / Weather", value: "fas fa-cloud-rain" }
              - { label: "Snowflake / AC", value: "fas fa-snowflake" }
              - { label: "Thermometer", value: "fas fa-thermometer-half" }
              - { label: "Server / Computer", value: "fas fa-server" }

  - name: products
    label: Products & Systems
    type: file
    path: content/products.json
    fields:
      - name: items
        label: Product Items
        type: object
        list:
          collapsible:
            summary: "{title}"
        fields:
          - { name: title, label: "Product Name", type: string }
          - { name: description, label: "Description", type: text }
          - name: icon
            label: "Icon"
            type: select
            options:
              - { label: "Box / Package", value: "fas fa-box-open" }
              - { label: "Layers / Split System", value: "fas fa-layer-group" }
              - { label: "Rotate / Compressor", value: "fas fa-arrows-rotate" }
              - { label: "Sliders / Controls", value: "fas fa-sliders" }
              - { label: "Server / Computer Room", value: "fas fa-server" }
              - { label: "Thermometer / Heat Pump", value: "fas fa-thermometer-half" }
              - { label: "Snowflake / AC", value: "fas fa-snowflake" }
              - { label: "Store / Retail", value: "fas fa-store" }
              - { label: "Building", value: "fas fa-building" }

  - name: projects
    label: Projects
    type: file
    path: content/projects.json
    fields:
      - name: items
        label: Project Cards
        type: object
        list:
          collapsible:
            summary: "{title} ({category})"
        fields:
          - { name: category, label: "Category", type: string, hint: "e.g. Commercial, Medical, Industrial, Athletic" }
          - { name: title, label: "Project Title", type: string }
          - { name: description, label: "Description", type: text }
          - { name: image, label: "Project Photo", type: image }
          - name: icon
            label: "Placeholder Icon (shown when no photo)"
            type: select
            options:
              - { label: "Building / Commercial", value: "fas fa-building" }
              - { label: "Medical / X-Ray", value: "fas fa-x-ray" }
              - { label: "Warehouse / Industrial", value: "fas fa-warehouse" }
              - { label: "Gymnasium / Athletic", value: "fas fa-dumbbell" }
              - { label: "Store / Retail", value: "fas fa-store" }
          - { name: coming_soon, label: "Show 'Coming Soon' badge", type: boolean }

  - name: testimonials
    label: Client Reviews
    type: file
    path: content/testimonials.json
    fields:
      - name: items
        label: Reviews
        type: object
        list:
          collapsible:
            summary: "{name} — {city}"
        fields:
          - { name: name, label: "Reviewer Name", type: string }
          - { name: city, label: "City", type: string }
          - { name: quote, label: "Review Text", type: text }
          - name: stars
            label: "Star Rating"
            type: number

  - name: quiz
    label: Quiz Page
    type: file
    path: content/quiz.json
    fields:
      - { name: page_title, label: "Page Title", type: string }
      - { name: page_subtitle, label: "Page Subtitle", type: text }
      - { name: submit_button_text, label: "Submit Button Text", type: string }
      - { name: confirmation_message, label: "Confirmation Message", type: string }
      - name: questions
        label: Questions
        type: object
        list:
          collapsible:
            summary: "{question}"
        fields:
          - { name: id, label: "ID (do not change)", type: string }
          - { name: question, label: "Question Text", type: string }
          - name: options
            label: Answer Options
            type: object
            list:
              collapsible:
                summary: "{label}"
            fields:
              - { name: label, label: "Option Label", type: string }
              - { name: value, label: "Option Value (do not change)", type: string }
      - name: contact_step
        label: Contact Step
        type: object
        fields:
          - { name: heading, label: "Heading", type: string }
