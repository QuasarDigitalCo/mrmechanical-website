<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mr Mechanical LP | DFW HVAC & Mechanical Systems</title>
  <meta name="description" content="Premier DFW HVAC mechanical contracting and service provider. 50+ years combined experience serving Dallas/Fort Worth." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&family=Open+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" crossorigin="anonymous" />
  <style>
    /* ============================================================
       CSS CUSTOM PROPERTIES
    ============================================================ */
    :root {
      --clr-dark:    #0d1b2a;
      --clr-navy:    #1e3a5f;
      --clr-blue:    #2563a8;
      --clr-accent:  #e8971a;
      --clr-accent2: #f5b942;
      --clr-light:   #f4f7fb;
      --clr-white:   #ffffff;
      --clr-text:    #1a2332;
      --clr-muted:   #64748b;
      --clr-border:  #e2e8f0;

      --font-head: 'Montserrat', sans-serif;
      --font-body: 'Open Sans', sans-serif;

      --shadow-sm: 0 2px 8px rgba(0,0,0,0.08);
      --shadow-md: 0 4px 20px rgba(0,0,0,0.12);
      --shadow-lg: 0 8px 40px rgba(0,0,0,0.18);

      --radius:    12px;
      --radius-sm: 6px;
      --transition: 0.3s ease;
      --max-width: 1200px;
    }

    /* ============================================================
       RESET & BASE
    ============================================================ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; font-size: 16px; }

    body {
      font-family: var(--font-body);
      color: var(--clr-text);
      background: var(--clr-white);
      overflow-x: hidden;
      line-height: 1.6;
    }

    img { max-width: 100%; display: block; }
    a { text-decoration: none; color: inherit; }
    ul { list-style: none; }

    .container {
      width: min(var(--max-width), 100% - 3rem);
      margin-inline: auto;
    }

    .section-label {
      display: inline-block;
      font-family: var(--font-head);
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--clr-accent);
      margin-bottom: 0.75rem;
    }

    .section-title {
      font-family: var(--font-head);
      font-size: clamp(1.8rem, 3.5vw, 2.6rem);
      font-weight: 800;
      line-height: 1.15;
      color: var(--clr-dark);
    }

    .section-title span { color: var(--clr-blue); }

    .section-desc {
      font-size: 1.05rem;
      color: var(--clr-muted);
      max-width: 58ch;
      line-height: 1.7;
    }

    /* ============================================================
       SCROLL REVEAL ANIMATION CLASSES
    ============================================================ */
    .reveal {
      opacity: 0;
      transform: translateY(32px);
      transition: opacity 0.65s ease, transform 0.65s ease;
    }
    .reveal.visible {
      opacity: 1;
      transform: translateY(0);
    }
    .reveal-left {
      opacity: 0;
      transform: translateX(-40px);
      transition: opacity 0.65s ease, transform 0.65s ease;
    }
    .reveal-left.visible {
      opacity: 1;
      transform: translateX(0);
    }
    .reveal-right {
      opacity: 0;
      transform: translateX(40px);
      transition: opacity 0.65s ease, transform 0.65s ease;
    }
    .reveal-right.visible {
      opacity: 1;
      transform: translateX(0);
    }
    .delay-1 { transition-delay: 0.1s; }
    .delay-2 { transition-delay: 0.2s; }
    .delay-3 { transition-delay: 0.3s; }
    .delay-4 { transition-delay: 0.4s; }
    .delay-5 { transition-delay: 0.5s; }
    .delay-6 { transition-delay: 0.6s; }

    /* ============================================================
       NAVIGATION
    ============================================================ */
    .nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 1000;
      padding: 1rem 0;
      transition: background var(--transition), box-shadow var(--transition), padding var(--transition);
    }
    .nav.scrolled {
      background: rgba(13, 27, 42, 0.97);
      backdrop-filter: blur(12px);
      box-shadow: 0 2px 20px rgba(0,0,0,0.25);
      padding: 0.6rem 0;
    }
    .nav__inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1.5rem;
    }
    .nav__logo {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--clr-white);
      font-family: var(--font-head);
      font-size: 1.2rem;
      font-weight: 600;
      white-space: nowrap;
    }
    .nav__logo-icon {
      width: 38px; height: 38px;
      background: var(--clr-accent);
      border-radius: 8px;
      display: grid; place-items: center;
      font-size: 1rem;
      color: var(--clr-white);
      flex-shrink: 0;
    }
    .nav__logo-text { letter-spacing: -0.01em; }
    .nav__logo-text strong { font-weight: 800; color: var(--clr-accent); }

    .nav__links {
      display: flex;
      align-items: center;
      gap: 0.25rem;
    }
    .nav__link {
      color: rgba(255,255,255,0.85);
      font-family: var(--font-head);
      font-size: 0.88rem;
      font-weight: 600;
      padding: 0.4rem 0.75rem;
      border-radius: var(--radius-sm);
      transition: color var(--transition), background var(--transition);
    }
    .nav__link:hover {
      color: var(--clr-white);
      background: rgba(255,255,255,0.08);
    }
    .nav__cta {
      margin-left: 0.5rem;
      background: var(--clr-accent);
      color: var(--clr-white);
      font-family: var(--font-head);
      font-size: 0.85rem;
      font-weight: 700;
      padding: 0.5rem 1rem;
      border-radius: 50px;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      transition: background var(--transition), transform var(--transition);
      white-space: nowrap;
    }
    .nav__cta:hover {
      background: var(--clr-accent2);
      transform: translateY(-1px);
    }

    /* Hamburger */
    .nav__toggle {
      display: none;
      flex-direction: column;
      gap: 5px;
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
    }
    .nav__toggle span {
      display: block;
      width: 24px; height: 2px;
      background: var(--clr-white);
      border-radius: 2px;
      transition: var(--transition);
    }

    @media (max-width: 900px) {
      .nav__toggle { display: flex; }
      .nav__links {
        display: none;
        position: absolute;
        top: 100%; left: 0; right: 0;
        background: rgba(13,27,42,0.98);
        flex-direction: column;
        padding: 1.5rem;
        gap: 0.5rem;
        border-top: 1px solid rgba(255,255,255,0.1);
      }
      .nav__links.open { display: flex; }
      .nav__link { padding: 0.6rem 1rem; width: 100%; }
      .nav__cta { justify-content: center; margin-left: 0; }
    }

    /* ============================================================
       ACCESSIBILITY: REDUCED MOTION
    ============================================================ */
    @media (prefers-reduced-motion: reduce) {
      html { scroll-behavior: auto; }
      .reveal, .reveal-left, .reveal-right {
        transition: none;
        opacity: 1;
        transform: none;
      }
    }
  </style>
</head>
<body>

  <header class="nav" id="nav">
  <div class="container nav__inner">
    <a href="#hero" class="nav__logo">
      <span class="nav__logo-icon"><i class="fas fa-wind"></i></span>
      <span class="nav__logo-text">Mr<strong>Mechanical</strong></span>
    </a>
    <button class="nav__toggle" id="navToggle" aria-label="Open menu">
      <span></span><span></span><span></span>
    </button>
    <nav class="nav__links" id="navLinks">
      <a href="#about"    class="nav__link">About</a>
      <a href="#services" class="nav__link">Services</a>
      <a href="#products" class="nav__link">Products</a>
      <a href="#projects" class="nav__link">Projects</a>
      <a href="#contact"  class="nav__link">Contact</a>
      <a href="tel:9722711225" class="nav__cta">
        <i class="fas fa-phone"></i> (972) 271-1225
      </a>
    </nav>
  </div>
</header>
  <!-- HERO placeholder -->
  <!-- ABOUT placeholder -->
  <!-- SERVICES placeholder -->
  <!-- PRODUCTS placeholder -->
  <!-- PROJECTS placeholder -->
  <!-- CONTACT placeholder -->
  <!-- FOOTER placeholder -->

  <script>
    // Intersection Observer for scroll reveals
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(e => {
        if (e.isIntersecting) {
          e.target.classList.add('visible');
          observer.unobserve(e.target);
        }
      });
    }, { threshold: 0.12 });

    document.querySelectorAll('.reveal, .reveal-left, .reveal-right')
      .forEach(el => observer.observe(el));

    // Nav scroll behavior
    const nav = document.getElementById('nav');
    window.addEventListener('scroll', () => {
      nav.classList.toggle('scrolled', window.scrollY > 40);
    });

    // Mobile toggle
    document.getElementById('navToggle').addEventListener('click', () => {
      document.getElementById('navLinks').classList.toggle('open');
    });

    // Close mobile nav on link click
    document.querySelectorAll('.nav__link, .nav__cta').forEach(link => {
      link.addEventListener('click', () => {
        document.getElementById('navLinks').classList.remove('open');
      });
    });
  </script>
</body>
</html>
