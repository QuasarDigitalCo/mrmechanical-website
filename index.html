<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mr Mechanical LP | DFW HVAC & Mechanical Systems</title>
  <meta name="description" content="Premier DFW HVAC mechanical contracting and service provider. 50+ years combined experience serving Dallas/Fort Worth." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&family=Open+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    /* ============================================================
       CSS CUSTOM PROPERTIES
    ============================================================ */
    :root {
      --clr-dark:    #0d1b2a;
      --clr-navy:    #1e3a5f;
      --clr-blue:    #2563a8;
      --clr-accent:  #e8971a;
      --clr-accent2: #f5b942;
      --clr-light:   #f4f7fb;
      --clr-white:   #ffffff;
      --clr-text:    #1a2332;
      --clr-muted:   #64748b;
      --clr-border:  #e2e8f0;

      --font-head: 'Montserrat', sans-serif;
      --font-body: 'Open Sans', sans-serif;

      --shadow-sm: 0 2px 8px rgba(0,0,0,0.08);
      --shadow-md: 0 4px 20px rgba(0,0,0,0.12);
      --shadow-lg: 0 8px 40px rgba(0,0,0,0.18);

      --radius:    12px;
      --radius-sm: 6px;
      --transition: 0.3s ease;
      --max-width: 1200px;
    }

    /* ============================================================
       RESET & BASE
    ============================================================ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; font-size: 16px; }

    body {
      font-family: var(--font-body);
      color: var(--clr-text);
      background: var(--clr-white);
      overflow-x: hidden;
      line-height: 1.6;
    }

    img { max-width: 100%; display: block; }
    a { text-decoration: none; color: inherit; }
    ul { list-style: none; }

    .container {
      width: min(var(--max-width), 100% - 3rem);
      margin-inline: auto;
    }

    .section-label {
      display: inline-block;
      font-family: var(--font-head);
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--clr-accent);
      margin-bottom: 0.75rem;
    }

    .section-title {
      font-family: var(--font-head);
      font-size: clamp(1.8rem, 3.5vw, 2.6rem);
      font-weight: 800;
      line-height: 1.15;
      color: var(--clr-dark);
    }

    .section-title span { color: var(--clr-blue); }

    .section-desc {
      font-size: 1.05rem;
      color: var(--clr-muted);
      max-width: 58ch;
      line-height: 1.7;
    }

    /* ============================================================
       SCROLL REVEAL ANIMATION CLASSES
    ============================================================ */
    .reveal {
      opacity: 0;
      transform: translateY(32px);
      transition: opacity 0.65s ease, transform 0.65s ease;
    }
    .reveal.visible {
      opacity: 1;
      transform: translateY(0);
    }
    .reveal-left {
      opacity: 0;
      transform: translateX(-40px);
      transition: opacity 0.65s ease, transform 0.65s ease;
    }
    .reveal-left.visible {
      opacity: 1;
      transform: translateX(0);
    }
    .reveal-right {
      opacity: 0;
      transform: translateX(40px);
      transition: opacity 0.65s ease, transform 0.65s ease;
    }
    .reveal-right.visible {
      opacity: 1;
      transform: translateX(0);
    }
    .delay-1 { transition-delay: 0.1s; }
    .delay-2 { transition-delay: 0.2s; }
    .delay-3 { transition-delay: 0.3s; }
    .delay-4 { transition-delay: 0.4s; }
    .delay-5 { transition-delay: 0.5s; }
    .delay-6 { transition-delay: 0.6s; }
  </style>
</head>
<body>

  <!-- NAV placeholder -->
  <!-- HERO placeholder -->
  <!-- ABOUT placeholder -->
  <!-- SERVICES placeholder -->
  <!-- PRODUCTS placeholder -->
  <!-- PROJECTS placeholder -->
  <!-- CONTACT placeholder -->
  <!-- FOOTER placeholder -->

  <script>
    // Intersection Observer for scroll reveals
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(e => {
        if (e.isIntersecting) {
          e.target.classList.add('visible');
        }
      });
    }, { threshold: 0.12 });

    document.querySelectorAll('.reveal, .reveal-left, .reveal-right')
      .forEach(el => observer.observe(el));
  </script>
</body>
</html>
